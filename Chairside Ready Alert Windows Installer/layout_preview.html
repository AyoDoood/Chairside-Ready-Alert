<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chairside Ready Alert — Layout Preview</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #111827;
  min-height: 100vh;
  padding: 32px 24px;
  color: #fff;
}
h1 { text-align: center; font-size: 28px; font-weight: 700; margin-bottom: 6px; }
.subtitle { text-align: center; color: #9ca3af; margin-bottom: 32px; font-size: 15px; }

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
  max-width: 1440px;
  margin: 0 auto 28px;
}

.card-wrap {
  cursor: pointer;
  border-radius: 14px;
  overflow: hidden;
  border: 3px solid transparent;
  transition: all 0.18s ease;
  box-shadow: 0 4px 24px rgba(0,0,0,0.35);
}
.card-wrap:hover { transform: translateY(-4px); box-shadow: 0 10px 36px rgba(0,0,0,0.5); }
.card-wrap.selected { border-color: #60a5fa; box-shadow: 0 0 0 5px rgba(96,165,250,0.25), 0 10px 36px rgba(0,0,0,0.5); }

.card-label {
  text-align: center;
  font-size: 12px;
  font-weight: 700;
  padding: 7px 10px;
  background: rgba(0,0,0,0.45);
  color: #fff;
  letter-spacing: 0.04em;
}
.card-num {
  display: inline-block;
  background: rgba(255,255,255,0.18);
  border-radius: 4px;
  padding: 1px 6px;
  margin-right: 6px;
  font-size: 10px;
}

/* ── app mockup ── */
.app-preview { padding: 10px; font-size: 11px; line-height: 1.3; }
.app-title-text { font-size: 13px; font-weight: 800; margin-bottom: 8px; }

.top-row { display: flex; gap: 6px; margin-bottom: 6px; }
.p-card { border-radius: 7px; padding: 8px; }
.station-card { flex: 0 0 44%; }
.rmsg-card { flex: 1; }

.p-card-title { font-size: 10px; font-weight: 700; margin-bottom: 6px; }
.field-lbl { font-size: 8px; margin-bottom: 2px; opacity: 0.75; }

.fake-input {
  height: 17px; border-radius: 3px; border: 1px solid;
  padding: 0 5px; font-size: 8.5px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 4px; width: 100%;
}
.sound-row { display: flex; gap: 3px; margin-bottom: 4px; align-items: center; }
.sound-row .fake-input { flex: 1; margin-bottom: 0; }
.play-b {
  width: 20px; height: 17px; border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; flex-shrink: 0; border: none;
}

.slider-track { height: 3px; border-radius: 2px; margin: 5px 0 3px; position: relative; }
.slider-fill { height: 100%; width: 65%; border-radius: 2px; }
.slider-thumb { width: 8px; height: 8px; border-radius: 50%; position: absolute; top: -2.5px; left: 62%; border: 1.5px solid; }

.status-line { font-size: 8.5px; font-weight: 700; margin-bottom: 4px; }
.log-box { border-radius: 4px; padding: 4px 5px; height: 46px; overflow: hidden; }
.log-entry { font-size: 7.5px; line-height: 1.75; opacity: 0.7; }

.ready-wrap { display: flex; justify-content: center; padding: 8px 0 7px; }
.ready-b {
  padding: 9px 0; width: 80%; border-radius: 7px;
  font-size: 15px; font-weight: 800; border: none;
  cursor: default; letter-spacing: 0.03em; text-align: center;
}

.send-card { border-radius: 7px; padding: 8px; }
.send-title { font-size: 10px; font-weight: 700; margin-bottom: 6px; }
.checks { display: flex; flex-wrap: wrap; gap: 5px 10px; }
.chk { display: flex; align-items: center; gap: 3px; font-size: 8.5px; }
.chk-box {
  width: 10px; height: 10px; border-radius: 2px; border: 1.5px solid;
  display: flex; align-items: center; justify-content: center; font-size: 6.5px; flex-shrink: 0;
}

/* ── bottom bar ── */
.bottom-bar {
  max-width: 1440px; margin: 0 auto;
  background: rgba(255,255,255,0.07);
  border-radius: 16px; padding: 18px 32px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; min-height: 64px;
}
.bottom-bar strong { color: #60a5fa; }

  <div class="app-title-text" style="color:${t.titleColor}">Chairside Ready Alert</div>
  <div class="top-row">
    <div class="p-card station-card" style="background:${t.cardBg};border:1px solid ${t.border}">
      <div class="p-card-title" style="color:${t.text}">Station Setup</div>
      <div class="field-lbl" style="color:${t.sub}">Station name</div>
      <div class="fake-input" style="background:${t.inputBg};border-color:${t.inputBorder};color:${t.text}">Room 1 <span style="opacity:.5">▾</span></div>

      <div class="field-lbl" style="color:${t.sub}">Alert Volume</div>
      <div class="slider-track" style="background:${t.sliderTrack}">

    </div>
    <div class="p-card rmsg-card" style="background:${t.cardBg};border:1px solid ${t.border}">
      <div class="status-line" style="color:${t.status}">Online: Doctor, Room 2</div>
      <div class="p-card-title" style="color:${t.text}">Ready Messages</div>
      <div class="log-box" style="background:${t.logBg}">

        <div class="log-entry" style="color:${t.logText}">[09:22 AM] Room 2: Ready</div>
        <div class="log-entry" style="color:${t.logText}">[09:35 AM] Ready → Doctor</div>
      </div>
    </div>
  </div>
  <div class="ready-wrap">
    <div class="ready-b" style="background:${t.accent};color:${t.accentText}">Ready</div>
  </div>
  <div class="send-card" style="background:${t.cardBg};border:1px solid ${t.border}">
    <div class="send-title" style="color:${t.text}">Send Message</div>
    <div class="checks">
      <div class="chk" style="color:${t.text}"><div class="chk-box" style="border-color:${t.checkFill};background:${t.checkFill};color:${t.accentText}">✓</div>Doctor</div>

const grid = document.getElementById('grid');
const bar  = document.getElementById('sel-bar');

themes.forEach((t, i) => {

  wrap.className = 'card-wrap';
  wrap.innerHTML = `<div class="card-label"><span class="card-num">${i+1}</span>${t.name}</div>${buildMockup(t)}`;

    document.querySelectorAll('.card-wrap').forEach(c => c.classList.remove('selected'));
    wrap.classList.add('selected');
    bar.innerHTML = `Selected: <strong>#${i+1} — ${t.name}</strong> &nbsp;·&nbsp; Tell me this number and I'll apply it!`;
