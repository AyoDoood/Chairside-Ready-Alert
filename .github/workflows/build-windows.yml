name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest
            python-arch: x64
          - arch: x86
            runner: windows-latest
            python-arch: x86
          - arch: arm64
            runner: windows-11-arm
            python-arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12 (${{ matrix.python-arch }})
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: ${{ matrix.python-arch }}

      - name: Verify interpreter architecture
        shell: pwsh
        run: |
          python -c "import platform, sys; print('arch:', platform.architecture()); print('machine:', platform.machine()); print('exe:', sys.executable)"

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Verify .NET
        shell: pwsh
        run: dotnet --info

      - name: Resolve .NET RID
        shell: pwsh
        run: |
          $rid = switch ("${{ matrix.arch }}") {
            "x64"   { "win-x64" }
            "x86"   { "win-x86" }
            "arm64" { "win-arm64" }
            default { throw "Unknown arch: ${{ matrix.arch }}" }
          }
          echo "DOTNET_RID=$rid" >> $env:GITHUB_ENV
          Write-Host "Using RID: $rid"

      - name: Build StoreHelper (C#)
        shell: pwsh
        run: |
          $publishDir = Join-Path $PWD "StoreHelper/publish/$env:DOTNET_RID"
          if (Test-Path $publishDir) { Remove-Item -Recurse -Force $publishDir }
          dotnet publish StoreHelper/StoreHelper.csproj `
            -c Release `
            -r $env:DOTNET_RID `
            --self-contained true `
            -p:PublishSingleFile=true `
            -o $publishDir
          if ($LASTEXITCODE -ne 0) { throw "dotnet publish failed for $env:DOTNET_RID" }
          $exe = Join-Path $publishDir "StoreHelper.exe"
          if (-not (Test-Path $exe)) { throw "StoreHelper.exe not found at $exe" }
          echo "STORE_HELPER_EXE=$exe" >> $env:GITHUB_ENV
          Write-Host "StoreHelper EXE: $exe ($((Get-Item $exe).Length) bytes)"

      - name: Build EXE
        shell: pwsh
        working-directory: Windows Store Submission
        run: |
          .\build_windows_exe.ps1 -PythonExe python -StoreHelperExe $env:STORE_HELPER_EXE

      - name: Upload EXE artifact (direct-installer path)
        uses: actions/upload-artifact@v4
        with:
          name: ChairsideReadyAlert-${{ matrix.arch }}
          path: Windows Store Submission/dist/ChairsideReadyAlert/
          if-no-files-found: error

      - name: Stage MSIX inputs
        shell: pwsh
        run: |
          $stage = Join-Path $env:RUNNER_TEMP "msix-staging"
          if (Test-Path $stage) { Remove-Item -Recurse -Force $stage }
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $stage "Assets") -Force | Out-Null

          # Copy PyInstaller --onedir bundle (everything inside, not the parent folder).
          $exeDir = "Windows Store Submission/dist/ChairsideReadyAlert"
          Copy-Item -Path (Join-Path $exeDir "*") -Destination $stage -Recurse -Force

          # Copy logos with MSIX-standard names that match AppxManifest.xml.
          $logosDir = "Windows Store Submission/logos"
          Copy-Item -Path (Join-Path $logosDir "store-logo-44.png")      -Destination (Join-Path $stage "Assets/Square44x44Logo.png")  -Force
          Copy-Item -Path (Join-Path $logosDir "store-logo-50.png")      -Destination (Join-Path $stage "Assets/StoreLogo.png")        -Force
          Copy-Item -Path (Join-Path $logosDir "store-logo-71.png")      -Destination (Join-Path $stage "Assets/Square71x71Logo.png")  -Force
          Copy-Item -Path (Join-Path $logosDir "store-logo-150.png")     -Destination (Join-Path $stage "Assets/Square150x150Logo.png") -Force
          Copy-Item -Path (Join-Path $logosDir "store-logo-310x150.png") -Destination (Join-Path $stage "Assets/Wide310x150Logo.png")  -Force
          Copy-Item -Path (Join-Path $logosDir "store-logo-310x310.png") -Destination (Join-Path $stage "Assets/Square310x310Logo.png") -Force

          # Read version from version.json; MSIX requires a 4-segment version.
          $vj = Get-Content -Raw -Path "version.json" | ConvertFrom-Json
          $msixVersion = "$($vj.version).0"
          Write-Host "MSIX version: $msixVersion"

          # Substitute placeholders in the manifest template.
          $manifest = Get-Content -Raw -Path "Windows Store Submission/AppxManifest.xml"
          $manifest = $manifest -replace "VERSION_PLACEHOLDER", $msixVersion
          $manifest = $manifest -replace "ARCH_PLACEHOLDER", "${{ matrix.arch }}"
          Set-Content -Path (Join-Path $stage "AppxManifest.xml") -Value $manifest -Encoding UTF8

          # If the user hasn't pasted the three Partner Center identity values yet,
          # skip MSIX packaging so the EXE artifacts still ship cleanly. We strip
          # XML comments before matching so descriptive text in the comment block
          # at the top of the manifest doesn't trip the check.
          $manifestNoComments = [System.Text.RegularExpressions.Regex]::Replace($manifest, '<!--[\s\S]*?-->', '')
          if ($manifestNoComments -match "TODO_PACKAGE_IDENTITY_NAME|TODO_PUBLISHER|TODO_PUBLISHER_DISPLAY_NAME") {
            Write-Host "::warning::AppxManifest.xml still contains TODO_* identity placeholders. Skipping MSIX packaging for ${{ matrix.arch }}. Paste the three identity values from Partner Center to enable Store-ready MSIX builds."
            echo "MSIX_READY=false" >> $env:GITHUB_ENV
          } else {
            echo "MSIX_READY=true" >> $env:GITHUB_ENV
          }

          # Echo the final manifest for build-log auditability.
          Write-Host "----- AppxManifest.xml (after substitution) -----"
          Get-Content -Path (Join-Path $stage "AppxManifest.xml") | Where-Object { $_ -match '<Identity|Version|Architecture|Publisher|<DisplayName' } | Write-Host
          Write-Host "--------------------------------------------------"

          echo "MSIX_STAGE=$stage" >> $env:GITHUB_ENV

      - name: Pack MSIX
        if: env.MSIX_READY == 'true'
        shell: pwsh
        run: |
          # Locate MakeAppx.exe in the most recent Windows 10 SDK.
          $kitsRoot = "C:\Program Files (x86)\Windows Kits\10\bin"
          $makeAppx = $null
          if (Test-Path $kitsRoot) {
            $kits = Get-ChildItem -Path $kitsRoot -Directory | Where-Object { $_.Name -match '^10\.' } | Sort-Object Name -Descending
            foreach ($kit in $kits) {
              foreach ($archDir in @("x64", "arm64", "x86")) {
                $candidate = Join-Path $kit.FullName "$archDir\MakeAppx.exe"
                if (Test-Path $candidate) { $makeAppx = $candidate; break }
              }
              if ($makeAppx) { break }
            }
          }
          if (-not $makeAppx) { throw "MakeAppx.exe not found under $kitsRoot. Install the Windows 10 SDK." }
          Write-Host "Using MakeAppx: $makeAppx"

          $stage = $env:MSIX_STAGE
          $output = Join-Path $env:RUNNER_TEMP "ChairsideReadyAlert-${{ matrix.arch }}.msix"
          if (Test-Path $output) { Remove-Item -Force $output }

          & $makeAppx pack /d $stage /p $output /v
          if ($LASTEXITCODE -ne 0) { throw "MakeAppx pack failed with exit code $LASTEXITCODE" }

          if (-not (Test-Path $output)) { throw "MakeAppx reported success but $output is missing." }
          $size = (Get-Item $output).Length
          Write-Host "MSIX produced: $output ($size bytes)"
          echo "MSIX_OUTPUT=$output" >> $env:GITHUB_ENV

      - name: Upload MSIX artifact
        if: env.MSIX_READY == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ChairsideReadyAlert-${{ matrix.arch }}-msix
          path: ${{ env.MSIX_OUTPUT }}
          if-no-files-found: error
